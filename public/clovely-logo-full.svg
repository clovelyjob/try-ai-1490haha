<svg width="280" height="80" viewBox="0 0 280 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Clovely Full Logo: C + Text + Card + Lines (Landing Version) -->
  
  <!-- Left decorative line -->
  <rect x="10" y="39" width="40" height="2" rx="1" fill="url(#lineGrad1)"/>
  
  <!-- Card background -->
  <rect x="60" y="15" width="160" height="50" rx="12" fill="#FDF7F0" opacity="0.95"/>
  <rect x="60" y="15" width="160" height="50" rx="12" stroke="url(#strokeGrad)" stroke-width="1.5" opacity="0.3"/>
  
  <!-- Subtle glow behind card -->
  <ellipse cx="140" cy="40" rx="90" ry="30" fill="#FF7A00" opacity="0.08" filter="blur(20px)"/>
  
  <!-- "C" Logo inside card -->
  <g transform="translate(80, 24)">
    <path d="M 28 8 
             A 16 16 0 0 1 28 40
             L 22 40
             A 10 10 0 0 0 22 8
             Z" 
          fill="url(#orangeGrad2)"/>
    <path d="M 26.5 10 
             A 14 14 0 0 1 26.5 38
             L 23 38
             A 10.5 10.5 0 0 0 23 10
             Z" 
          fill="white" opacity="0.25"/>
    <circle cx="14" cy="24" r="4" fill="#FF7A00"/>
    <circle cx="14" cy="24" r="2.5" fill="white" opacity="0.5"/>
  </g>
  
  <!-- "Clovely" Text inside card (complete with C) -->
  <text x="132" y="48" font-family="Inter, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="22" font-weight="600" fill="#1F2937" letter-spacing="-0.02em">
    Clovely
  </text>
  
  <!-- Right decorative line -->
  <rect x="230" y="39" width="40" height="2" rx="1" fill="url(#lineGrad2)"/>
  
  <!-- Gradients -->
  <defs>
    <linearGradient id="lineGrad1" x1="10" y1="40" x2="50" y2="40">
      <stop offset="0%" stop-color="#FF7A00" stop-opacity="0"/>
      <stop offset="100%" stop-color="#FF7A00"/>
    </linearGradient>
    
    <linearGradient id="lineGrad2" x1="230" y1="40" x2="270" y2="40">
      <stop offset="0%" stop-color="#FF7A00"/>
      <stop offset="100%" stop-color="#FF7A00" stop-opacity="0"/>
    </linearGradient>
    
    <linearGradient id="strokeGrad" x1="60" y1="15" x2="220" y2="65">
      <stop offset="0%" stop-color="#FF7A00"/>
      <stop offset="100%" stop-color="#FFB88A"/>
    </linearGradient>
    
    <linearGradient id="orangeGrad2" x1="0" y1="0" x2="32" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF7A00"/>
      <stop offset="50%" stop-color="#FF8A1A"/>
      <stop offset="100%" stop-color="#FF6F61"/>
    </linearGradient>
  </defs>
</svg>