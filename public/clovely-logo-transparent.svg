<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Clovely Logo - "C" Letter with Orange Glow -->
  
  <!-- Background circle with gradient -->
  <circle cx="60" cy="60" r="52" fill="url(#bgGradient)" opacity="0.15"/>
  
  <!-- Main "C" shape -->
  <path d="M 85 35 
           A 30 30 0 0 1 85 85
           L 75 85
           A 20 20 0 0 0 75 35
           Z" 
        fill="url(#cGradient)"/>
  
  <!-- Inner highlight for depth -->
  <path d="M 82 40 
           A 27 27 0 0 1 82 80
           L 77 80
           A 22 22 0 0 0 77 40
           Z" 
        fill="white" opacity="0.25"/>
  
  <!-- Center dot accent -->
  <circle cx="50" cy="60" r="8" fill="#FF7A00"/>
  <circle cx="50" cy="60" r="5" fill="white" opacity="0.4"/>
  
  <!-- Gradients -->
  <defs>
    <linearGradient id="bgGradient" x1="10" y1="10" x2="110" y2="110" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF7A00"/>
      <stop offset="100%" stop-color="#FFB88A"/>
    </linearGradient>
    
    <linearGradient id="cGradient" x1="60" y1="30" x2="90" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF7A00"/>
      <stop offset="50%" stop-color="#FF8A1A"/>
      <stop offset="100%" stop-color="#FF6F61"/>
    </linearGradient>
  </defs>
</svg>