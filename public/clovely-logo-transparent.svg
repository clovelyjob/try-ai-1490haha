<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Clovely Logo - Simple & Clean -->
  
  <!-- Main circle -->
  <circle cx="60" cy="60" r="48" fill="url(#orangeGradient)" opacity="0.95"/>
  
  <!-- Four leaf petals forming clover -->
  <ellipse cx="60" cy="35" rx="18" ry="22" fill="#FFB88A" opacity="0.85"/>
  <ellipse cx="85" cy="60" rx="22" ry="18" fill="#FF6F61" opacity="0.85"/>
  <ellipse cx="60" cy="85" rx="18" ry="22" fill="#FF7A00" opacity="0.90"/>
  <ellipse cx="35" cy="60" rx="22" ry="18" fill="#FFB88A" opacity="0.85"/>
  
  <!-- Center circle -->
  <circle cx="60" cy="60" r="18" fill="white" opacity="0.3"/>
  <circle cx="60" cy="60" r="12" fill="#FF7A00"/>
  <circle cx="60" cy="60" r="8" fill="white" opacity="0.4"/>
  
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="orangeGradient" x1="20" y1="20" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF7A00"/>
      <stop offset="50%" stop-color="#FFB88A"/>
      <stop offset="100%" stop-color="#FF6F61"/>
    </linearGradient>
  </defs>
</svg>