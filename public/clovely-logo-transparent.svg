<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Clovely Logo - Transparent Background -->
  <!-- Main circle with gradient -->
  <circle cx="60" cy="60" r="50" fill="url(#gradient1)" />
  
  <!-- Inner leaf/clover shape -->
  <path d="M60 20 C70 20, 75 30, 75 40 C75 50, 70 55, 60 55 C50 55, 45 50, 45 40 C45 30, 50 20, 60 20 Z" fill="#FFB88A" opacity="0.8"/>
  <path d="M80 60 C80 50, 70 45, 60 45 C50 45, 45 50, 45 60 C45 70, 50 75, 60 75 C70 75, 80 70, 80 60 Z" fill="#FF6F61" opacity="0.8"/>
  <path d="M60 100 C50 100, 45 90, 45 80 C45 70, 50 65, 60 65 C70 65, 75 70, 75 80 C75 90, 70 100, 60 100 Z" fill="#FF7A00" opacity="0.9"/>
  
  <!-- Center highlight -->
  <circle cx="60" cy="60" r="15" fill="white" opacity="0.3"/>
  <circle cx="60" cy="60" r="10" fill="#FF7A00"/>
  
  <!-- Gradients -->
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF7A00;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFB88A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6F61;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>